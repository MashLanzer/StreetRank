<!DOCTYPE html>
<!--
  index.html
  Página principal de StreetRank.
  - Si el usuario NO está logueado: muestra login + registro.
  - Si está logueado pero sin perfil: redirige a profile-setup.html
  - Si está logueado con perfil completo: redirige a dashboard.html
-->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="StreetRank – La red social de ranking de peleas callejeras." />
  <title>StreetRank – El Ring de la Calle</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 768px)" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#c0392b" />
  <link rel="apple-touch-icon" href="icon.png" />
</head>
<body>

<!-- ─── Loader global ─── -->
<div id="loader" class="loader-overlay">
  <div class="spinner"></div>
  <p class="loader-text">Cargando...</p>
</div>

<!-- ─── Toast notifications ─── -->
<div id="toastContainer" class="toast-container"></div>

<!-- ─── Auth Page ─── -->
<div class="auth-page">

  <!-- Fondo decorativo con "SR" grande difuminado -->
  <div style="
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-family:'Bebas Neue',cursive;
    font-size:40vw;
    color:rgba(192,57,43,0.03);
    pointer-events:none;
    user-select:none;
    letter-spacing:-10px;
    line-height:1;
    z-index:0;
  ">SR</div>

  <div class="auth-box" style="position:relative;z-index:1;">

    <!-- Logo -->
    <div class="auth-logo">
      <h1 class="glitch"><span>Street</span>Rank</h1>
      <p>⚔️ El ring de la calle • Global</p>
    </div>

    <!-- Tabs: Login / Registro -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Registrarse</button>
    </div>

    <!-- ─── Formulario Login ─── -->
    <form class="auth-form active" id="formLogin" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="loginEmail">📧 Email</label>
        <input
          type="email"
          id="loginEmail"
          class="form-control"
          placeholder="tu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="loginPassword">🔒 Contraseña</label>
        <input
          type="password"
          id="loginPassword"
          class="form-control"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <p id="loginError" class="form-error hidden"></p>

      <button type="submit" id="btnLogin" class="btn btn-primary btn-full btn-lg mt-2">
        Entrar al ring
      </button>

      <p class="text-center mt-2" style="font-size:0.85rem;color:var(--text-muted);">
        ¿No tienes cuenta?
        <a href="#" onclick="switchTab('register')">Regístrate gratis</a>
      </p>
    </form>

    <!-- ─── Formulario Registro ─── -->
    <form class="auth-form" id="formRegister" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="regEmail">📧 Email</label>
        <input
          type="email"
          id="regEmail"
          class="form-control"
          placeholder="tu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="regPassword">🔒 Contraseña</label>
        <input
          type="password"
          id="regPassword"
          class="form-control"
          placeholder="Mínimo 6 caracteres"
          required
          minlength="6"
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="regPasswordConfirm">🔒 Confirmar contraseña</label>
        <input
          type="password"
          id="regPasswordConfirm"
          class="form-control"
          placeholder="Repite tu contraseña"
          required
          autocomplete="new-password"
        />
      </div>

      <p id="regError" class="form-error hidden"></p>

      <button type="submit" id="btnRegister" class="btn btn-primary btn-full btn-lg mt-2">
        Crear cuenta
      </button>

      <p class="text-center mt-2" style="font-size:0.85rem;color:var(--text-muted);">
        ¿Ya tienes cuenta?
        <a href="#" onclick="switchTab('login')">Iniciar sesión</a>
      </p>
    </form>

    <!-- Footer info -->
    <div class="separator mt-3">Info</div>
    <p style="font-size:0.75rem;color:var(--text-muted);text-align:center;line-height:1.6;">
      Al registrarte aceptas nuestros términos de uso.<br/>
      StreetRank es una plataforma de roleplay y ranking. No promovemos violencia real.
    </p>

  </div>
</div>

<!-- ─── Scripts ─── -->
<script type="module">
  // Importa firebase y lógica de auth
  import { auth, db } from './firebase.js';
  import {
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    onAuthStateChanged
  } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
  import {
    doc, getDoc
  } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const loader = document.getElementById('loader');
  const toastContainer = document.getElementById('toastContainer');

  // Registrar Service Worker para PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registrado ✨'))
        .catch(err => console.warn('SW no registrado ⚠️', err));
    });
  }

  // ─── Verificar estado de auth al cargar ───────────────────────────────────
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      // Usuario logueado → revisar si tiene perfil completo
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists() && userDoc.data().profileComplete) {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'profile-setup.html';
        }
      } catch (err) {
        // permission-denied = reglas de Firestore bloqueando (ir a crear perfil)
        if (err.code === 'permission-denied') {
          window.location.href = 'profile-setup.html';
        } else {
          console.warn('Error verificando perfil:', err.code);
          loader.classList.add('hidden');
        }
      }
    } else {
      // No logueado → mostrar formulario
      loader.classList.add('hidden');
    }
  });

  // ─── Cambio de tabs ───────────────────────────────────────────────────────
  window.switchTab = function(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('formLogin').classList.toggle('active', tab === 'login');
    document.getElementById('formRegister').classList.toggle('active', tab === 'register');
    // Limpiar errores
    document.getElementById('loginError').classList.add('hidden');
    document.getElementById('regError').classList.add('hidden');
  };

  // ─── Login ────────────────────────────────────────────────────────────────
  window.handleLogin = async function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');
    const btnEl = document.getElementById('btnLogin');

    errorEl.classList.add('hidden');
    btnEl.disabled = true;
    btnEl.innerHTML = '<span class="spinner-sm"></span> Verificando...';

    try {
      await signInWithEmailAndPassword(auth, email, password);
      // onAuthStateChanged se encargará de redirigir
    } catch (err) {
      errorEl.textContent = translateAuthError(err.code);
      errorEl.classList.remove('hidden');
      btnEl.disabled = false;
      btnEl.innerHTML = 'Entrar al ring';
    }
  };

  // ─── Registro ─────────────────────────────────────────────────────────────
  window.handleRegister = async function(e) {
    e.preventDefault();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regPasswordConfirm').value;
    const errorEl = document.getElementById('regError');
    const btnEl = document.getElementById('btnRegister');

    errorEl.classList.add('hidden');

    // Validar contraseñas
    if (password !== confirm) {
      errorEl.textContent = 'Las contraseñas no coinciden.';
      errorEl.classList.remove('hidden');
      return;
    }

    btnEl.disabled = true;
    btnEl.innerHTML = '<span class="spinner-sm"></span> Creando cuenta...';

    try {
      await createUserWithEmailAndPassword(auth, email, password);
      // onAuthStateChanged redirigirá a profile-setup.html
    } catch (err) {
      errorEl.textContent = translateAuthError(err.code);
      errorEl.classList.remove('hidden');
      btnEl.disabled = false;
      btnEl.innerHTML = 'Crear cuenta';
    }
  };

  // ─── Traducción de errores Firebase Auth ─────────────────────────────────
  function translateAuthError(code) {
    const errors = {
      'auth/user-not-found': 'No existe una cuenta con ese email.',
      'auth/wrong-password': 'Contraseña incorrecta.',
      'auth/invalid-email': 'El email no es válido.',
      'auth/email-already-in-use': 'Ese email ya está registrado.',
      'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
      'auth/too-many-requests': 'Demasiados intentos. Intenta de nuevo más tarde.',
      'auth/network-request-failed': 'Sin conexión. Verifica tu internet.',
      'auth/invalid-credential': 'Email o contraseña incorrectos.',
      // Error 400: Email/Password no habilitado en Firebase Console
      'auth/operation-not-allowed': '⚠️ Activa Email/Contraseña en Firebase Console → Authentication → Sign-in method.',
    };
    return errors[code] || `Error inesperado [${code}]`;
  }
</script>

</body>
</html>
