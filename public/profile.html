<!DOCTYPE html>
<!--
  profile.html
  Página de perfil:
  - Si ?uid= está en la URL y es diferente al usuario logueado: perfil ajeno (sin email, con botón desafiar).
  - Sin parámetro o ?uid= propio: perfil propio con edición y estadísticas completas.
  - Cambio de foto: sube a ImgBB (0 cuota en Firebase Storage); guarda URL en Firestore.
-->
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Perfil de peleador en StreetRank"/>
  <title>StreetRank – Perfil</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#c0392b" />
</head>
<body>

<div id="loader" class="loader-overlay"><div class="spinner"></div><p class="loader-text">Cargando...</p></div>
<div id="toastContainer" class="toast-container"></div>

<!-- Modal editar perfil -->
<div class="modal-overlay" id="editModal">
  <div class="modal" style="max-width:600px;max-height:90vh;overflow-y:auto;">
    <button class="modal-close" onclick="closeEditModal()">✕</button>
    <div class="modal-title">✏️ Editar Perfil</div>
    <form id="editForm" onsubmit="saveEditProfile(event)" style="margin-top:1rem;">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Apodo</label>
          <input type="text" id="editApodo" class="form-control" required maxlength="30"/>
        </div>
        <div class="form-group">
          <label class="form-label">Ciudad</label>
          <input type="text" id="editCiudad" class="form-control" required maxlength="60"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Peso (kg)</label>
          <input type="number" id="editPeso" class="form-control" min="40" max="200" step="0.1"/>
        </div>
        <div class="form-group">
          <label class="form-label">Altura (cm)</label>
          <input type="number" id="editAltura" class="form-control" min="140" max="230"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Descripción</label>
        <textarea id="editDescripcion" class="form-control" rows="4" maxlength="500"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">📸 Cambiar foto de perfil</label>
        <input type="file" id="editPhotoInput" class="form-control" accept="image/jpeg,image/png,image/webp"/>
        <p class="form-hint">★ Se subirá a ImgBB (sin gastar cuota de Firebase Storage) · Máx 5 MB</p>
      </div>
      <p id="editError" class="form-error hidden"></p>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1rem;">
        <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancelar</button>
        <button type="submit" id="btnSaveEdit" class="btn btn-primary">Guardar cambios</button>
      </div>
    </form>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="dashboard.html" class="navbar-brand">
      <span class="navbar-logo glitch"><span>Street</span>Rank</span>
    </a>
    <div class="navbar-nav">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <button class="btn btn-secondary btn-sm" onclick="handleLogout()">Salir</button>
      <img id="navAvatar" src="" alt="" class="nav-avatar" style="display:none;"/>
    </div>
  </div>
</nav>

<div style="max-width:900px;margin:0 auto;padding:1.5rem 1rem;" id="profilePageContent" style="display:none;">

  <!-- Header del perfil -->
  <div class="profile-page-header" id="profileHeader">
    <!-- Se rellena dinámicamente -->
  </div>

  <!-- Stats rápidas -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem;" id="statsGrid">
  </div>

  <!-- Descripción -->
  <div class="card mb-2" id="descCard" style="display:none;">
    <div class="card-header"><span class="card-title">📖 Historia</span></div>
    <p id="profileDesc" style="color:var(--text-secondary);font-size:0.95rem;line-height:1.7;font-style:italic;"></p>
  </div>

  <!-- Historial de peleas -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">⚔️ Historial de Peleas</span>
      <span id="fightCount" style="font-size:0.85rem;color:var(--text-muted);"></span>
    </div>
    <div id="fightHistory">
      <div class="empty-state">
        <div class="empty-icon">🥊</div>
        <h3>Sin peleas aún</h3>
        <p>Las peleas aparecerán aquí cuando se registren.</p>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import { auth, db, uploadToImgBB } from './firebase.js';
  import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
  import {
    doc, getDoc, updateDoc, serverTimestamp, collection, query, orderBy, limit, getDocs
  } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const loader = document.getElementById('loader');
  let currentUser = null;
  let viewedUid = null;
  let viewedData = null;
  let isOwnProfile = false;

  // Obtener uid de la URL (si existe)
  const urlParams = new URLSearchParams(window.location.search);
  const targetUid = urlParams.get('uid');

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;
    viewedUid = targetUid || user.uid;
    isOwnProfile = (viewedUid === user.uid);

    // Actualizar nav avatar
    try {
      const myDoc = await getDoc(doc(db, 'users', user.uid));
      if (myDoc.exists()) {
        const myData = myDoc.data();
        const navAvatar = document.getElementById('navAvatar');
        navAvatar.src = myData.photoURL || '';
        navAvatar.style.display = 'block';
      }
    } catch(e){}

    await loadProfile();
    loader.classList.add('hidden');
    document.getElementById('profilePageContent').style.display = 'block';
  });

  async function loadProfile() {
    try {
      const snap = await getDoc(doc(db, 'users', viewedUid));
      if (!snap.exists()) {
        document.getElementById('profilePageContent').innerHTML = `
          <div class="empty-state" style="margin-top:4rem;">
            <div class="empty-icon">🕵️</div>
            <h3>Peleador no encontrado</h3>
            <p>Este perfil no existe o fue eliminado.</p>
            <a href="dashboard.html" class="btn btn-primary mt-2">Volver al Dashboard</a>
          </div>`;
        return;
      }
      viewedData = snap.data();
      renderProfile(viewedData);
    } catch(err) {
      console.error(err);
      showToast('error', 'Error', 'No se pudo cargar el perfil.');
    }
  }

  function getLevel(score) {
    if (score >= 2000) return { label: '🔥 LEYENDA', cls: 'level-legend' };
    if (score >= 1500) return { label: '👑 CAMPEÓN', cls: 'level-champion' };
    if (score >= 1250) return { label: '⚡ BRAWLER', cls: 'level-brawler' };
    if (score >= 1100) return { label: '🥋 FIGHTER', cls: 'level-fighter' };
    return { label: '🆕 ROOKIE', cls: 'level-rookie' };
  }

  function renderProfile(d) {
    const manoLabels = { derecha: '👊 Orthodox', zurda: '🤜 Southpaw', ambidiestra: '⚡ Switch' };
    const totalFights = (d.wins || 0) + (d.losses || 0) + (d.draws || 0);
    const winRate = totalFights > 0 ? Math.round((d.wins / totalFights) * 100) : 0;
    const level = getLevel(d.score || 1000);

    // Header
    document.getElementById('profileHeader').innerHTML = `
      <img src="${escHtml(d.photoURL || 'https://api.dicebear.com/7.x/adventurer-neutral/svg?seed=' + encodeURIComponent(d.apodo))}"
           alt="${escHtml(d.apodo)}" class="profile-page-avatar"/>
      <div class="profile-page-info">
        <div class="profile-page-apodo">${escHtml(d.apodo)}</div>
        <div class="profile-page-name">${escHtml(d.nombre)}</div>
        <div class="profile-page-meta">
          <span>🌍 ${escHtml(d.pais)}</span>
          <span>🏙️ ${escHtml(d.ciudad)}</span>
          <span>🎂 ${d.edad} años</span>
          <span>⚖️ ${d.peso} kg</span>
          <span>📏 ${d.altura} cm</span>
          <span>${manoLabels[d.manoHabil] || d.manoHabil || '—'}</span>
        </div>
        <div style="margin-top:0.5rem;">
          <span class="level-badge ${level.cls}">${level.label}</span>
        </div>
        <div class="profile-page-score mt-1">
          <span class="profile-big-score">${d.score || 1000}</span>
          <span style="color:var(--text-muted);font-size:0.9rem;">puntos ELO</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0.5rem;align-items:flex-end;">
        ${isOwnProfile ? `
          <button class="btn btn-outline" onclick="openEditModal()">✏️ Editar perfil</button>
          <button class="btn btn-secondary btn-sm" onclick="window.location.href='dashboard.html'">← Dashboard</button>
        ` : `
          <button class="btn btn-primary" onclick="challengeUser('${escHtml(d.uid)}','${escHtml(d.apodo)}')">⚔️ Desafiar</button>
          <a href="dashboard.html" class="btn btn-secondary btn-sm">← Volver</a>
        `}
      </div>
    `;

    // Stats
    document.getElementById('statsGrid').innerHTML = `
      <div class="card text-center">
        <div style="font-family:var(--font-display);font-size:2.5rem;color:var(--success);">${d.wins || 0}</div>
        <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">Victorias</div>
      </div>
      <div class="card text-center">
        <div style="font-family:var(--font-display);font-size:2.5rem;color:var(--danger);">${d.losses || 0}</div>
        <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">Derrotas</div>
      </div>
      <div class="card text-center">
        <div style="font-family:var(--font-display);font-size:2.5rem;color:var(--warning);">${d.draws || 0}</div>
        <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">Empates</div>
      </div>
      <div class="card text-center">
        <div style="font-family:var(--font-display);font-size:2.5rem;color:var(--gold);">${winRate}%</div>
        <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">Win Rate</div>
      </div>
      <div class="card text-center">
        <div style="font-family:var(--font-display);font-size:2.5rem;">${totalFights}</div>
        <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);">Total peleas</div>
      </div>
    `;

    // Descripción
    if (d.descripcion) {
      document.getElementById('descCard').style.display = 'block';
      document.getElementById('profileDesc').textContent = `"${d.descripcion}"`;
    }

    // Historial de peleas
    const fights = d.fights || [];
    document.getElementById('fightCount').textContent = `${fights.length} pelea(s)`;
    if (fights.length > 0) {
      const sorted = [...fights].sort((a, b) => {
        const da = a.fecha?.toDate ? a.fecha.toDate() : new Date(a.fecha || 0);
        const db2 = b.fecha?.toDate ? b.fecha.toDate() : new Date(b.fecha || 0);
        return db2 - da;
      });
      document.getElementById('fightHistory').innerHTML = `
        <div class="fight-list">
          ${sorted.map(f => {
            const diff = (f.miScoreDespues || 0) - (f.miScoreAntes || 0);
            const diffStr = diff >= 0 ? `+${diff}` : `${diff}`;
            const diffCls = diff > 0 ? 'positive' : diff < 0 ? 'negative' : '';
            const fecha = f.fecha?.toDate ? f.fecha.toDate().toLocaleDateString('es') : (f.fecha ? new Date(f.fecha).toLocaleDateString('es') : '—');
            return `
              <div class="fight-item">
                <div class="fight-result ${f.resultado}">${f.resultado === 'win' ? 'WIN' : f.resultado === 'loss' ? 'LOSS' : 'DRAW'}</div>
                <div class="fight-opponent">
                  <div class="apodo">vs. ${escHtml(f.opponentApodo || '???')}</div>
                  <div class="date">${fecha}</div>
                </div>
                <div class="fight-score-change ${diffCls}">${diffStr} pts</div>
              </div>`;
          }).join('')}
        </div>`;
    }
  }

  // ─── Editar perfil ────────────────────────────────────────────────────────
  window.openEditModal = function() {
    if (!viewedData) return;
    document.getElementById('editApodo').value = viewedData.apodo || '';
    document.getElementById('editCiudad').value = viewedData.ciudad || '';
    document.getElementById('editPeso').value = viewedData.peso || '';
    document.getElementById('editAltura').value = viewedData.altura || '';
    document.getElementById('editDescripcion').value = viewedData.descripcion || '';
    document.getElementById('editModal').classList.add('open');
  };

  window.closeEditModal = function() {
    document.getElementById('editModal').classList.remove('open');
    document.getElementById('editError').classList.add('hidden');
  };

  window.saveEditProfile = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSaveEdit');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-sm"></span> Guardando...';
    const errorEl = document.getElementById('editError');
    errorEl.classList.add('hidden');

    try {
      let photoURL = viewedData.photoURL;
      const file = document.getElementById('editPhotoInput').files[0];
      if (file) {
        if (file.size > 5 * 1024 * 1024) { throw new Error('Foto demasiado grande (máx 5 MB).'); }
        // Sube a ImgBB, no consume Firebase Storage
        const { url, deleteUrl } = await uploadToImgBB(file);
        photoURL = url;
        // Guardamos la deleteUrl por si el usuario quiere borrar la foto después
        await updateDoc(doc(db, 'users', currentUser.uid), { photoDeleteUrl: deleteUrl });
      }

      const updates = {
        apodo: document.getElementById('editApodo').value.trim(),
        ciudad: document.getElementById('editCiudad').value.trim(),
        peso: parseFloat(document.getElementById('editPeso').value),
        altura: parseInt(document.getElementById('editAltura').value),
        descripcion: document.getElementById('editDescripcion').value.trim(),
        photoURL,
        updatedAt: serverTimestamp()
      };

      await updateDoc(doc(db, 'users', currentUser.uid), updates);
      viewedData = { ...viewedData, ...updates };
      renderProfile(viewedData);
      closeEditModal();
      showToast('success', 'Guardado', 'Perfil actualizado correctamente.');
    } catch(err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    } finally {
      btn.disabled = false; btn.innerHTML = 'Guardar cambios';
    }
  };

  // ─── Desafiar usuario (desde perfil ajeno) ────────────────────────────────
  window.challengeUser = async function(toUid, toApodo) {
    if (!currentUser) return;
    if (toUid === currentUser.uid) { showToast('warning','Ojo','No puedes desafiarte a ti mismo.'); return; }
    try {
      const { db: firestoreDb } = await import('./firebase.js');
      const { addDoc, collection: col, serverTimestamp: sts } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
      const mySnap = await getDoc(doc(db, 'users', currentUser.uid));
      const myData = mySnap.data();
      if (!myData?.profileComplete) { showToast('warning','Perfil incompleto','Completa tu perfil antes de desafiar.'); return; }
      await addDoc(collection(db, 'challenges'), {
        fromUid: currentUser.uid, fromApodo: myData.apodo,
        fromScore: myData.score || 1000,
        toUid, toApodo,
        status: 'pending', timestamp: serverTimestamp()
      });
      showToast('success','¡Desafío enviado!',`Has desafiado a ${toApodo}. Espera su respuesta.`);
    } catch(err) {
      showToast('error','Error','No se pudo enviar el desafío: '+err.message);
    }
  };

  window.handleLogout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  };

  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.showToast = function(type, title, msg, dur=4000) {
    const icons={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
    const t=document.createElement('div');
    t.className=`toast ${type}`;
    t.innerHTML=`<span class="toast-icon">${icons[type]||'ℹ️'}</span><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${msg}</div></div>`;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(()=>{t.classList.add('fade-out');setTimeout(()=>t.remove(),300);},dur);
  };
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
